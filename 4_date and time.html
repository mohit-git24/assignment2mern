<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Date & Time</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 30px;
            border-radius: 12px;
            background: #1e1e1e;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease-in-out;
        }
        h1 {
            font-size: 24px;
            color: #00aaff;
            margin-bottom: 20px;
        }
        .date-time-container {
            padding: 20px;
            background: #333;
            border-radius: 8px;
            transition: all 0.3s ease-in-out;
        }
        .date, .time {
            font-size: 22px;
            margin: 10px 0;
            font-weight: bold;
        }
        .label {
            font-weight: bold;
            color: #00c3ff;
        }
        #refreshBtn {
            background-color: #00aaff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: 0.3s;
        }
        #refreshBtn:hover {
            background-color: #0088cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Live Date & Time</h1>
        <div class="date-time-container">
            <div class="date">
                <span class="label">Date:</span> <span id="currentDate"></span>
            </div>
            <div class="time">
                <span class="label">Time:</span> <span id="currentTime"></span>
            </div>
        </div>
        <button id="refreshBtn" onclick="updateDateTime()">Refresh</button>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const optionsDate = { day: "numeric", month: "long", year: "numeric" };
            const formattedDate = now.toLocaleDateString("en-US", optionsDate);
            const formattedTime = now.toLocaleTimeString("en-US", { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });

            document.getElementById("currentDate").textContent = formattedDate;
            document.getElementById("currentTime").textContent = formattedTime;
        }

        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
